version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agronomist_db
    environment:
      POSTGRES_USER: ${DB_USER:-agronomist}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agronomist_dev}
      POSTGRES_DB: ${DB_NAME:-agronomist}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agronomist}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: agronomist_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-agronomist}:${DB_PASSWORD:-agronomist_dev}@db:5432/${DB_NAME:-agronomist}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-secret-key-change-before-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VISION_PROVIDER: ${VISION_PROVIDER:-gemini}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-plain}
      UPLOAD_DIR: /app/uploads
      KNOWLEDGE_STORAGE_DIR: /app/knowledge_uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - backend_uploads:/app/uploads
      - backend_knowledge:/app/knowledge_uploads
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  backend_uploads:
  backend_knowledge:
